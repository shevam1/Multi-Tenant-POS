packages:
  - "apps/*"
  - "packages/*"

# Trusted dependencies allowed to run install scripts (Prisma downloads its
# query engine here; esbuild/sharp fetch native binaries; Nest prints a notice).
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
